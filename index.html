<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Todo Lite</title>
    <!-- Google Fonts: Inter 사용 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* CSS 변수 선언: Obsidian 다크 테마 기반 */
        :root {
            --bg-color: #1e1e1e; /* Obsidian 배경색 */
            --card-bg: rgba(45, 45, 45, 0.7); /* 글래스모피즘 카드 배경 */
            --primary-color: #8a6ae4; /* Obsidian 보라색 포인트 */
            --text-color: #dcddde; /* 기본 텍스트 색상 */
            --text-muted: #8e8e8e; /* 비활성/보조 텍스트 */
            --border-color: #3e3e3e; /* 구분선 색상 */
            --danger-color: #ff5555; /* 삭제 버튼 색상 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 메인 컨테이너: Glassmorphism 적용 */
        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(10px); /* 배경 흐림 효과 */
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 24px;
            color: #ffffff;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1::before {
            content: '📝';
        }

        /* 입력창 영역 */
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button#add-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 18px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button#add-btn:hover {
            opacity: 0.9;
        }

        /* 할 일 목록 스타일 */
        ul {
            list-style: none;
        }

        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 10px;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        li:hover {
            border-color: var(--border-color);
            background: rgba(255, 255, 255, 0.05);
        }

        .todo-content {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        /* 커스텀 체크박스 스타일 */
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .todo-text {
            font-size: 0.95rem;
            color: var(--text-color);
            cursor: pointer;
        }

        .completed .todo-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* 삭제 버튼 */
        .delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
            transition: color 0.2s;
            line-height: 1;
        }

        .delete-btn:hover {
            color: var(--danger-color);
        }

        /* 빈 상태 메시지 */
        .empty-msg {
            text-align: center;
            color: var(--text-muted);
            margin-top: 20px;
            font-size: 0.9rem;
        }

        /* 애니메이션 효과 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        li {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>오늘 할 일</h1>
        
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="새로운 할 일을 입력하세요..." autocomplete="off">
            <button id="add-btn">추가</button>
        </div>

        <ul id="todo-list">
            <!-- 할 일 항목이 여기에 추가됩니다 -->
        </ul>
        <div id="empty-state" class="empty-msg">할 일이 없습니다. 즐거운 하루 되세요!</div>
    </div>

    <script>
        // DOM 요소 참조
        const input = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');
        const todoList = document.getElementById('todo-list');
        const emptyState = document.getElementById('empty-state');

        // 앱 데이터 상태
        let todos = JSON.parse(localStorage.getItem('obsidian_todos')) || [];

        // 초기 렌더링
        function init() {
            renderTodos();
        }

        // 할 일 리스트를 화면에 그리는 함수
        function renderTodos() {
            todoList.innerHTML = '';
            
            if (todos.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                
                todos.forEach((todo, index) => {
                    const li = document.createElement('li');
                    if (todo.completed) li.classList.add('completed');

                    li.innerHTML = `
                        <div class="todo-content">
                            <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${index})">
                            <span class="todo-text" onclick="toggleTodo(${index})">${escapeHtml(todo.text)}</span>
                        </div>
                        <button class="delete-btn" onclick="deleteTodo(${index})">&times;</button>
                    `;
                    todoList.appendChild(li);
                });
            }

            // LocalStorage에 현재 상태 저장
            localStorage.setItem('obsidian_todos', JSON.stringify(todos));
        }

        // 새 할 일 추가 함수
        function addTodo() {
            const text = input.value.trim();
            if (text === '') return;

            todos.push({
                text: text,
                completed: false
            });

            input.value = '';
            renderTodos();
        }

        // 할 일 완료 상태 토글 함수
        function toggleTodo(index) {
            todos[index].completed = !todos[index].completed;
            renderTodos();
        }

        // 할 일 삭제 함수
        function deleteTodo(index) {
            if (confirm('정말 삭제하시겠습니까?')) {
                todos.splice(index, 1);
                renderTodos();
            }
        }

        // HTML 이스케이프 (보안 - XSS 방지)
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 이벤트 리스너: 클릭 및 엔터 키 지원
        addBtn.addEventListener('click', addTodo);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        // 앱 시작
        init();
    </script>
</body>
</html>
